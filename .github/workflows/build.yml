name: Build morning brief

on:
  schedule:
    # 06:30 UTC = 08:30 CEST (été) / 07:30 CET (hiver) — capture mj_eu + wrap of yesterday
    - cron: '30 6 * * 1-5'
    # 13:00 UTC = 15:00 CEST (été) / 14:00 CET (hiver) — capture mj_us
    - cron: '0 13 * * 1-5'
  workflow_dispatch:    # bouton "Run workflow" manuel pour debug et premier run

permissions:
  contents: write       # le workflow va commit+push les briefs générés

concurrency:
  group: build-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python build.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "auto: brief $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
